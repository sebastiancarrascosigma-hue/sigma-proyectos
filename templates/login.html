<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar · Sigma Proyectos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/static/css/app.css" rel="stylesheet">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="login-logo"><i class="bi bi-lightning-charge-fill text-white"></i></div>
      <h5 class="fw-bold text-dark mb-0">Sigma Proyectos</h5>
      <p class="text-muted small mt-1">Control de proyectos energéticos</p>
    </div>

    {% if error %}
    <div class="alert alert-danger d-flex align-items-center gap-2 py-2 small" role="alert">
      <i class="bi bi-exclamation-triangle-fill"></i> {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login">
      <div class="mb-3">
        <label class="form-label">Correo electrónico</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
          <input type="email" name="email" class="form-control border-start-0 ps-0"
                 placeholder="usuario@sigmaenergia.cl" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
          <input type="password" name="password" class="form-control border-start-0 ps-0"
                 placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-semibold py-2" style="border-radius:10px">
        <i class="bi bi-box-arrow-in-right me-1"></i> Ingresar
      </button>
    </form>

    <div class="text-center mt-4 pt-3 border-top">
      <small class="text-muted">Sigma Energía SpA &copy; {{ 2026 }}</small>
    </div>
  </div>
</div>
</body>
</html>
