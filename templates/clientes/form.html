{% extends "base.html" %}
{% block title %}{{ 'Editar' if cliente else 'Nuevo' }} Cliente · Sigma Proyectos{% endblock %}
{% block page_title %}
  {% if cliente %}<i class="bi bi-pencil me-2 text-warning"></i>Editar Cliente
  {% else %}<i class="bi bi-plus-circle me-2 text-primary"></i>Nuevo Cliente{% endif %}
{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-body p-4">
        <form method="post" action="{{ '/clientes/' + cliente.id|string + '/editar' if cliente else '/clientes/nuevo' }}">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">Nombre del Cliente / Empresa *</label>
              <input type="text" name="nombre" class="form-control"
                     value="{{ cliente.nombre if cliente else '' }}" required
                     placeholder="Ej: Minera Antucoya SpA">
            </div>
            <div class="col-md-6">
              <label class="form-label">RUT</label>
              <input type="text" name="rut" class="form-control"
                     value="{{ cliente.rut or '' if cliente else '' }}"
                     placeholder="76.123.456-7">
            </div>
            <div class="col-md-6">
              <label class="form-label">Nombre Contacto</label>
              <input type="text" name="contacto_nombre" class="form-control"
                     value="{{ cliente.contacto_nombre or '' if cliente else '' }}"
                     placeholder="Nombre del contacto principal">
            </div>
            <div class="col-md-6">
              <label class="form-label">Email Contacto</label>
              <input type="email" name="contacto_email" class="form-control"
                     value="{{ cliente.contacto_email or '' if cliente else '' }}"
                     placeholder="contacto@empresa.cl">
            </div>
            <div class="col-md-6">
              <label class="form-label">Teléfono</label>
              <input type="text" name="contacto_telefono" class="form-control"
                     value="{{ cliente.contacto_telefono or '' if cliente else '' }}"
                     placeholder="+56 9 1234 5678">
            </div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary fw-semibold px-4">
              <i class="bi bi-check-lg me-1"></i>{{ 'Guardar' if cliente else 'Crear Cliente' }}
            </button>
            <a href="/clientes" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
