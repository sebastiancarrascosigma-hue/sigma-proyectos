services:
  - type: web
    name: sigma-proyectos
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false        # lo ingresas manualmente en el dashboard de Render
      - key: PYTHONIOENCODING
        value: utf-8
